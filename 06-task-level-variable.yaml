- name: variables to print
  hosts: web
  become: yes
  tasks:
  - name: print the information
    vars: # this is task level variables.
      COURSE: "DevOps with AWS"
      DURATION: "120HRS"
      TRAINER: "SHIVA"
      TIMINGS: "7AM TO 10AM"
    ansible.builtin.debug:
      msg: "Hi, I am learning {{ COURSE }}, Duration is: {{ DURATION }}, Trainer is: {{ TRAINER }}, Timings is: {{ TIMINGS }}"
  
  tasks:
  - name: print the information again
    vars:
      COURSE: "Ansible"
    ansible.builtin.debug:
      msg: "Hi, I am learning {{ COURSE }}"

  tasks:
  - name: print the information again and again
    vars:
      COURSE: "Jenkins"
    ansible.builtin.debug:
      mgs: "Hi, I am learning {{ COURSE }}"
