- name: variables to print
  hosts: web
  become: yes
  tasks:
  - name: print full information
    vars: # this is task level variables.
      COURSE: "DevOps with AWS"
      DURATION: "120HRS"
      TRAINER: "SHIVA"
      TIMINGS: "7AM TO 10AM"
    ansible.builtin.debug:
      msg: "Hi, I am learning {{ COURSE }}, Duration is: {{ DURATION }}, Trainer is: {{ TRAINER }}, Timings is: {{ TIMINGS }}"

  tasks:
  - name: print course Ansible
    vars:
      COURSE: "Ansible"
    ansible.builtin.debug:
      msg: "Hi, I am learning {{ COURSE }}"

  tasks:
  - name: print course Jenkins
    vars:
      COURSE: "Jenkins"
    ansible.builtin.debug:
      msg: "Hi, I am learning {{ COURSE }}"

  tasks:
  - name: print course Terraform
    vars:
      COURSE: "Terraform"
    ansible.builtin.debug:
      msg: "Hi, I am learning {{ COURSE }}"
  
  tasks:
  - name: print course Kubernates
    vars:
      COURSE: "Kubernates"
    ansible.builtin.debug:
      msg: "Hi, I am learning {{ COURSE }}"
  
  tasks:
  - name: print course Docker
    vars:
      COURSE: "Docker"
    ansible.builtin.debug:
      msg: "Hi, I am learning {{ COURSE }}"