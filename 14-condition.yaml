- name: check the number is less than 10 or not
  hosts: local
  connection: local

  vars:
    number: 150

  tasks:
    - name: print this less than 10
      ansible.builtin.debug:
        msg: "Given number {{ number }} is less than 10"
      when: number | int < 10

    - name: print this greater than 10
      ansible.builtin.debug:
        msg: "Given number {{ number }} is greater than 10"
      when: number | int > 10
