- name: check the number is less than 10 or not
  hosts: local
  connection: local
  var:
    number: 150 
  
  tasks:
  - name: print this less than 10
    ansible.builtin.debug:
      msg: "Given number {{ number }} is less than 10"
    when: number < | int 10 # conditional expression
  
  - name: print this greter than 10
    ansible.builtin.debug:
      msg: "Given number {{ number }} is greter than 10"
    when: number > | int 10 # conditional expression
