- name: check the number is less than 10 or not
  hosts: local
  connection: local
  vars_prompt:
  - name: number
    prompt: please enter the number
    private: false
 
  tasks:
    - name: less than 10
      debug:
        msg: "Given number {{ number }} is less than 10"
      when: number | int < 10

    - name: equal to 10
      debug:
        msg: "Given number {{ number }} is equal to 10"
      when: number | int == 10

    - name: greater than 10
      debug:
        msg: "Given number {{ number }} is greater than 10"
      when: number | int > 10