- name: loops demo
  hosts: web
  become: yes
  tasks:
  - name: some packages install and some packages remove
    ansible.builtin.debug:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop:
    - { name: 'mysql', state: 'present'}
    - { name: 'nginx', state: 'absent' }
    - { name: 'postfix', state: 'present' }
    - { name: 'https', state: 'absent' }