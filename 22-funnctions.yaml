- name: demo on functions/filters
  hosts: local
  connection: local
  tasks:
  - name: print the default variables
    ansible.builtin.debug:
      msg: "Hello {{ course | default('Ansible') }}"

  - name: convert to uppercase
    vars:
      greeting: "Hello venkatesh"
    ansible.builtin.debug:
      msg: "{{ greeting | upper }}"

  - name: convert to lowercase
    vars:
      greeting: "Hello venkatesh"
    ansible.builtin.debug:
      msg: "{{ greeting | lower }}"

  - name: find the unique numbers
    vars:
      numbers: [1,2,3,4,5,6,230,45,90]
    ansible.builtin.debug:
      msg: "{{ numbers | unique }}"