- name: demo on functions/filters
  hosts: local
  connection: local
  tasks:
  - name: print the default variables
    ansible.builtin.debug:
      msg: "Hello {{ course | default('Ansible') }}"

  - name: convert to uppercase
    vars:
      greeting: "Hello venkatesh"
    ansible.builtin.debug:
      msg: "{{ greeting | upper }}"

  - name: convert to lowercase
    vars:
      greeting: "Hello venkatesh"
    ansible.builtin.debug:
      msg: "{{ greeting | lower }}"

  - name: find the unique numbers
    vars:
      numbers: [1,2,3,4,5,6,230,45,90]
    ansible.builtin.debug:
      msg: "{{ numbers | unique }}"
  
  - name: get max number and min number
    vars:
      numbers: [1,2,3,4,5,6,230,45,90]
    ansible.builtin.debug:
      msg: "Min: {{ numbers | min }}, Max: {{ numbers | max }}" 

  - name: convert to map to list
    vars:
      course:
        name: "DevOps with AWS"
        duration: 120Hrs
        timings: "7am to 10am"
        trainer: "shiva"
    ansible.builtin.debug:
      msg: "{{ course | dict2items }}"

  - name: convert to list to map
    vars:
      course: 
        - { "key": "name","value": "DevOps with AWS" }
        - { "key": "duration","value": "120Hrs" }
        - { "key": "timings","value": "7am to 10am" }
        - { "key": "trainer","value": "shiva" }
    ansible.builtin.debug:
      msg: "{{ course | items2dict }}"