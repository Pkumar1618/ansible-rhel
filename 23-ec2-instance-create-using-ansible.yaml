- name: create ec2 and r53 records
  hosts: local
  connection: local
  vars:
    subnet_id: subnet-06279b56e282f8eeb # replace with your subnet id
    sg_id: "sg-015fd38c0c9f467ed"
    ami_id: "ami-0220d79f3f480ecf5"
    instances: # this is variable (this is variable is list type)
    - mysql
    - backend
    - frontend

  tasks:
    - name: create ec2 instance
      amazon.aws.ec2_instance:
        name: "{{ item }}"
        vpc_subnet_id: "{{ subnet_id }}"
        instance_type: "t3.micro"
        security_group: "{{ sg_id }}"
        image_id: "{{ ami_id }}"
      loop: "{{ instances }}"
      register: ec2_instances